<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveMC - Minecraft 服务器管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="logo">HiveMC</div>
        <div class="nav-right">
            {% if user %}
                <span class="welcome-text">{{ user }}</span>
                <a href="{{ url_for('logout') }}" class="btn-logout">退出</a>
            {% else %}
                <a href="{{ url_for('login_page') }}" class="btn-login">登录</a>
            {% endif %}
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Minecraft 服务器管理面板</h1>
            <p>管理你的 Minecraft 服务器，随时随地。</p>
            <div class="actions">
                {% if user %}
                    <a href="{{ url_for('backend') }}" class="btn-primary">进入后台</a>
                {% else %}
                    <a href="{{ url_for('login_page') }}" class="btn-primary">开始使用</a>
                {% endif %}
            </div>
        </div>
    </header>

    <footer>
        <p>HiveMC</p>
    </footer>

</body>
</html>
