<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - HiveMC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="logo">HiveMC</div>
        <div class="nav-right">
            <span class="welcome-text">{{ user.username }}</span>
            <a href="{{ url_for('backend') }}" class="btn-login">返回</a>
            <a href="{{ url_for('logout') }}" class="btn-logout">退出</a>
        </div>
    </nav>

    <div class="console-container">
        <div class="console-header">
            <div class="console-header-left">
                <button id="btn-start" class="btn-action btn-start">启动</button>
                <button id="btn-stop" class="btn-action btn-stop" disabled>停止</button>
                <button id="btn-restart" class="btn-action btn-restart" disabled>重启</button>
            </div>
            <span id="server-status" class="status-indicator">离线</span>
        </div>

        <div id="console-logs" class="console-logs"></div>

        <div class="console-input-area">
            <span class="prompt">&gt;</span>
            <input type="text" id="cmd-input" placeholder="输入指令..." autocomplete="on">
            <button id="btn-send">发送</button>
        </div>
    </div>

    <script>
        var SERVER_ID = "{{ server_id }}";
        var logContainer = document.getElementById('console-logs');
        var inputField = document.getElementById('cmd-input');
        var sendBtn = document.getElementById('btn-send');
        var startBtn = document.getElementById('btn-start');
        var stopBtn = document.getElementById('btn-stop');
        var restartBtn = document.getElementById('btn-restart');
        var statusSpan = document.getElementById('server-status');

        function setRunningState(running) {
            startBtn.disabled = running;
            stopBtn.disabled = !running;
            restartBtn.disabled = !running;
            statusSpan.textContent = running ? '在线' : '离线';
        }

        function addLog(text, type) {
            var div = document.createElement('div');
            div.className = 'log-line ' + (type || 'info');
            var time = new Date().toLocaleTimeString();
            div.innerText = '[' + time + '] ' + text;
            logContainer.appendChild(div);
        }

        function api(url, body, cb) {
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            }).then(function(r) { return r.json(); }).then(cb);
        }

        startBtn.addEventListener('click', function() {
            api('/api/start', { server_id: SERVER_ID }, function(data) {
                addLog(data.msg, 'system');
                if (typeof data.msg === 'number' || !isNaN(data.msg)) setRunningState(true);
            });
        });

        stopBtn.addEventListener('click', function() {
            api('/api/stop', { server_id: SERVER_ID }, function(data) {
                addLog(data.msg, 'system');
                setRunningState(false);
            });
        });

        restartBtn.addEventListener('click', function() {
            api('/api/restart', { server_id: SERVER_ID }, function(data) {
                addLog(data.msg, 'system');
                setRunningState(true);
            });
        });

        function sendCommand() {
            var cmd = inputField.value.trim();
            if (!cmd) return;
            api('/api/command', { command: cmd, server_id: SERVER_ID }, function(data) {
                if (data.status === 'error') addLog(data.msg, 'error');
            });
            inputField.value = '';
        }

        sendBtn.addEventListener('click', sendCommand);
        inputField.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendCommand(); });

        function fetchLogs() {
            fetch('/api/console?server_id=' + SERVER_ID)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.logs.length > 0) {
                        data.logs.forEach(function(log) {
                            var type = 'info';
                            if (log.indexOf('ERROR') >= 0) type = 'error';
                            else if (log.indexOf('WARN') >= 0) type = 'warn';
                            else if (log.indexOf('Starting') >= 0) type = 'success';
                            else if (log.indexOf('Done') >= 0 || log.indexOf('For help') >= 0) type = 'success';
                            addLog(log, type);
                        });
                        logContainer.scrollTop = logContainer.scrollHeight;
                    }
                });
        }

        setInterval(fetchLogs, 500);

        function checkStatus() {
            fetch('/api/server/status?server_id=' + SERVER_ID)
                .then(function(r) { return r.json(); })
                .then(function(data) { if (data.status === 'success') setRunningState(data.running); });
        }

        setInterval(checkStatus, 5000);
        checkStatus();
    </script>

</body>
</html>
