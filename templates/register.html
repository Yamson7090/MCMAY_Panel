<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - HiveMC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>HiveMC</h1>
                <p>创建新账户</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <ul class="flashes">
                    {% for category, message in messages %}
                        <li class="{{ category }}">{{ message }}</li>
                    {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            <form method="POST" action="/register">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="至少 6 位" required>
                </div>
                <div class="input-group">
                    <label>确认密码</label>
                    <input type="password" name="confirm_password" placeholder="再次输入密码" required>
                </div>
                <button type="submit" class="btn-submit">注册</button>
            </form>

            <div class="login-footer">
                <a href="/login">已有账户？去登录</a>
            </div>
        </div>
    </div>

</body>
</html>
